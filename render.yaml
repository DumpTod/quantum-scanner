services:
  - type: web
    name: quantum-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 600 --bind 0.0.0.0:10000
    envVars:
      - key: FYERS_PIN
        sync: false   # Set this in Render dashboard
    healthCheckPath: /api/health
